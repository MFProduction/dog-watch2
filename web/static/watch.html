<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Watch - Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .status-overlay {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
        }
        .status-badge {
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="status-overlay">
        <span id="statusBadge" class="badge bg-secondary status-badge">Connecting...</span>
    </div>

    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="webrtc.js"></script>
    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const statusBadge = document.getElementById('statusBadge');

        let client = null;

        function updateStatus(status) {
            statusBadge.className = 'badge status-badge';
            switch (status) {
                case 'signaling':
                    statusBadge.classList.add('bg-warning');
                    statusBadge.textContent = 'Connecting...';
                    break;
                case 'connecting':
                    statusBadge.classList.add('bg-warning');
                    statusBadge.textContent = 'Connecting...';
                    break;
                case 'connected':
                    statusBadge.classList.add('bg-success');
                    statusBadge.textContent = 'Connected';
                    setTimeout(() => {
                        statusBadge.style.opacity = '0';
                    }, 2000);
                    break;
                case 'disconnected':
                    statusBadge.classList.add('bg-secondary');
                    statusBadge.textContent = 'Disconnected';
                    statusBadge.style.opacity = '0.9';
                    break;
                case 'error':
                    statusBadge.classList.add('bg-danger');
                    statusBadge.textContent = 'Error';
                    statusBadge.style.opacity = '0.9';
                    break;
                default:
                    statusBadge.classList.add('bg-secondary');
                    statusBadge.textContent = status;
            }
        }

        function initViewer() {
            client = new WebRTCClient('viewer');
            client.onStatusChange = updateStatus;
            client.onRemoteStream = (stream) => {
                remoteVideo.srcObject = stream;
            };

            client.createPeerConnection();
            client.connectWebSocket();
        }

        initViewer();
    </script>
</body>
</html>
