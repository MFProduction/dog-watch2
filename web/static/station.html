<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Watch - Station</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .video-container {
            max-width: 800px;
            margin: 0 auto;
        }
        #localVideo {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
        }
        .status-badge {
            font-size: 1rem;
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="display-5">Dog Watch Station</h1>
            <p class="lead">Camera and microphone streaming station</p>
        </div>

        <div class="video-container">
            <div class="card shadow">
                <div class="card-body">
                    <div class="mb-3">
                        <span id="statusBadge" class="badge bg-secondary status-badge">Disconnected</span>
                    </div>

                    <div class="mb-3">
                        <video id="localVideo" autoplay muted playsinline></video>
                    </div>

                    <div class="d-grid gap-2">
                        <button id="startBtn" class="btn btn-primary btn-lg">Start Streaming</button>
                        <button id="stopBtn" class="btn btn-danger btn-lg" style="display: none;">Stop Streaming</button>
                    </div>
                </div>
            </div>

            <div class="mt-3 text-center text-muted">
                <small>Open <code>/watch</code> on your phone to view the stream</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="webrtc.js"></script>
    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const localVideo = document.getElementById('localVideo');
        const statusBadge = document.getElementById('statusBadge');

        let client = null;

        function updateStatus(status) {
            statusBadge.className = 'badge status-badge';
            switch (status) {
                case 'signaling':
                    statusBadge.classList.add('bg-warning');
                    statusBadge.textContent = 'Connecting...';
                    break;
                case 'connecting':
                    statusBadge.classList.add('bg-warning');
                    statusBadge.textContent = 'Connecting...';
                    break;
                case 'connected':
                    statusBadge.classList.add('bg-success');
                    statusBadge.textContent = 'Streaming';
                    break;
                case 'disconnected':
                    statusBadge.classList.add('bg-secondary');
                    statusBadge.textContent = 'Disconnected';
                    break;
                case 'error':
                    statusBadge.classList.add('bg-danger');
                    statusBadge.textContent = 'Error';
                    break;
                default:
                    statusBadge.classList.add('bg-secondary');
                    statusBadge.textContent = status;
            }
        }

        async function startStreaming() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });

                localVideo.srcObject = stream;

                client = new WebRTCClient('station');
                client.onStatusChange = updateStatus;

                client.createPeerConnection();
                client.addLocalStream(stream);
                client.connectWebSocket();

                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';

            } catch (error) {
                console.error('Error accessing media devices:', error);
                alert('Failed to access camera and microphone. Please check permissions.');
            }
        }

        function stopStreaming() {
            if (client) {
                client.close();
                client = null;
            }

            localVideo.srcObject = null;
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            updateStatus('disconnected');
        }

        startBtn.addEventListener('click', startStreaming);
        stopBtn.addEventListener('click', stopStreaming);
    </script>
</body>
</html>
