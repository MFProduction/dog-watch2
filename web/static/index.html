<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Watch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4">Dog Watch</h1>
            <p class="lead">Simple dog monitoring over your local network</p>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-md-5">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h3 class="card-title">Station</h3>
                        <p class="card-text">Open this on the computer with camera and microphone to start streaming.</p>
                        <a href="/station" class="btn btn-primary btn-lg">Go to Station</a>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h3 class="card-title">Watch</h3>
                        <p class="card-text">Open this on your phone to view the live stream from the station.</p>
                        <a href="/watch" class="btn btn-success btn-lg">Go to Watch</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
